# Central configuration for the lipid-graph-nn project.
# Loaded by lipid_gnn/config.py. All relative paths are resolved against REPO_ROOT.
# Environment overrides: CHUNKS_DIR > paths.chunks_dir; WANDB_MODE > wandb.mode; WANDB_GROUP > wandb.group.

paths:
  data_dir: data/membrane_only
  props_dir: results/properties
  resources_dir: resources
  ff_params_file: resources/martini_ff_params.json
  ff_edge_params_file: resources/martini_ff_edge_params.json
  ff_node_mapping_file: resources/martini_ff_node_mapping.json
  chunks_dir: colab_lipid_gnn_subset/processed
  subset_bundle_dir: colab_lipid_gnn_subset
  results_dir: results
  training_results_dir: results/training
  logs_dir: logs
  wandb_dir: results/wandb
  topology_filename: prun.tpr
  trajectory_filename: prun.xtc
  trajectory_subdir: run

dataset:
  spatial_cutoff: 11.0
  num_frames: 25
  chunk_size: 50
  interleave: true
  shuffle_seed: 42
  val_frac: 0.15
  test_frac: 0.15
  split_seed: 0
  atom_selection: "not (resname W or name NA or name CL)"
  rbf_start: 0.0
  rbf_num_gaussians: 16
  reference_system: POPC100

vocab:
  lipid_types: [POPC, DOPC, DIPC, DPPC, POPE, DOPE, DPPE, DOPS, POPS, CHOL]
  all_properties:
    - lipid_packing
    - thickness
    - thickness_std
    - compressibility
    - bending_modulus
    - persistence
    - diffusivity
    - variation
  active_properties: [lipid_packing, thickness, thickness_std, variation, persistence, diffusivity, compressibility]

model:
  in_channels: 4
  hidden_dim: 128
  num_layers: 2
  heads: 4
  dropout: 0.3
  comp_dim: 0
  bonded_edge_attr_dim: 2
  spatial_edge_attr_dim: 16

training:
  epochs: 200
  batch_size: 2
  num_workers: 6
  learning_rate: 3.0e-5
  weight_decay: 1.0e-3
  seed: 0
  patience: 10
  lr_factor: 0.5
  grad_clip_norm: 1.0
  amp_dtype: bfloat16
  log_every_n_batches: 10
  print_every_n_epochs: 10

wandb:
  project_prefix: lipid_gnn
  group: null
  mode: online
  entity: null

hpc:
  group: cellmembrane
  conda_env: lipid_gnn
  module_rocm: rocm/7.2.0
  modulefiles_path: /cluster/labs/modulefiles
  module_gromacs: gromacs/v2025.4/rocm-6.2.4_acpp-25.10.0
  partition_preprocess: gpu_test
  partition_train: gpu
  account: cellmembrane
  work_subpath: lipid-data

martini_pipeline:
  output_root: data/martini_pipeline
  insane_cmd: insane
  itp_dir: resources/martini3/itp
  mdp_templates_dir: lipid_gnn/martini_pipeline/templates
  mdp_freeze: lipid_gnn/martini_pipeline/templates/_audit_freeze.json

  box:
    xy_nm: 11.0
    z_nm: 10.0
    salt_M: 0.15
    water_type: W
    charge_mode: auto
    center: true
    pbc: rectangular

  run:
    nsteps_min: 20000
    nsteps_eq: 1000000        # 10 ns at dt=0.01 ps (Decision 14)
    nsteps_prod: -1           # -1 means caller must supply via CLI
    nstenergy_eq: 1000
    save_forces: false        # Decision 3
    seed_strategy: deterministic

  gmx:
    executable: gmx
    maxwarn: 2
    mdrun_extra_args: []

  hpc_output_subpath: martini_pipeline   # appended to /work/$GROUP/$USER/$work_subpath/

  hpc_defaults:                          # conservative pre-benchmark values; step 10 overwrites
    sims_per_node: 4
    cpus_per_sim: 8
    mem_per_sim: "16G"
    gpus_per_node: 8

  hpc_defaults_cpu:                      # general1 CPU defaults; step 10b overwrites
    sims_per_node: 4
    mpi_ranks_per_sim: 1
    cpus_per_sim: 10
    mem_per_sim: "16G"
    partition: general1
    module_gromacs_cpu: gromacs/2022.4-gcc-11.3.1-zx2wwcx
    module_mpi_cpu: mpi/openmpi/5.0.0
